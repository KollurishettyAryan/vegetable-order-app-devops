apiVersion: apps/v1
kind: Deployment
metadata:
  name: vegetable-app
  namespace: vegetable-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vegetable
  template:
    metadata:
      labels:
        app: vegetable
    spec:
      containers:
      - name: vegetable-container
        image: aryankollurishetty/vegetable-app:v1.0
        ports:
        - containerPort: 3000
